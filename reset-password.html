<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Mayil blooms</title>
  <link rel="stylesheet" href="styles.css">
  <script src="env.js"></script>
  <script src="config.js"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: var(--bg-dark);
      color: white;
      font-family: var(--font-body);
    }
    .reset-container {
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .reset-container h2 {
      font-family: var(--font-display);
      margin-bottom: 8px;
    }
    .reset-container p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 24px;
    }
    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .form-input {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-glass);
      border-radius: 8px;
      color: white;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--gold);
      color: black;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .message {
      margin-top: 16px;
      font-size: 14px;
    }
    .error { color: #E8384F; }
    .success { color: #50c850; }
  </style>
</head>
<body>
  <div class="reset-container">
    <h2>Reset Password</h2>
    <p>Enter your new password below.</p>
    
    <div class="form-group">
      <label class="form-label">New Password</label>
      <input type="password" class="form-input" id="newPassword" placeholder="••••••••">
    </div>
    
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input type="password" class="form-input" id="confirmPassword" placeholder="••••••••">
    </div>

    <div id="message" class="message"></div>

    <button class="btn" id="resetBtn">Reset Password</button>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const resetBtn = document.getElementById('resetBtn');
      const msgEl = document.getElementById('message');

      if (!token) {
        msgEl.className = 'message error';
        msgEl.textContent = 'Invalid or missing reset token.';
        resetBtn.disabled = true;
        return;
      }

      // Validate token
      fetch(`${catalogConfig.apiUrl}/auth/validate-reset-token?token=${encodeURIComponent(token)}`)
        .then(res => res.json())
        .then(data => {
          if (!data.data || !data.data.valid) {
            msgEl.className = 'message error';
            msgEl.textContent = 'This reset link is invalid or has expired.';
            resetBtn.disabled = true;
          }
        })
        .catch(err => {
          console.error(err);
          msgEl.className = 'message error';
          msgEl.textContent = 'Error validating token. Please try again.';
        });

      resetBtn.addEventListener('click', async () => {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        msgEl.className = 'message';
        msgEl.textContent = '';

        if (!newPassword || newPassword.length < 6) {
          msgEl.className = 'message error';
          msgEl.textContent = 'Password must be at least 6 characters.';
          return;
        }

        if (newPassword !== confirmPassword) {
          msgEl.className = 'message error';
          msgEl.textContent = 'Passwords do not match.';
          return;
        }

        resetBtn.disabled = true;
        resetBtn.textContent = 'Resetting...';

        try {
          const res = await fetch(`${catalogConfig.apiUrl}/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, newPassword })
          });
          const data = await res.json();
          
          if (res.ok) {
            msgEl.className = 'message success';
            msgEl.innerHTML = 'Password reset successfully. <a href="index.html" style="color:var(--gold)">Click here to log in</a>.';
          } else {
            msgEl.className = 'message error';
            msgEl.textContent = data.message || 'Failed to reset password.';
            resetBtn.disabled = false;
            resetBtn.textContent = 'Reset Password';
          }
        } catch (e) {
          msgEl.className = 'message error';
          msgEl.textContent = 'Cannot connect to the server. Please try again.';
          resetBtn.disabled = false;
          resetBtn.textContent = 'Reset Password';
        }
      });
    });
  </script>
</body>
</html>
